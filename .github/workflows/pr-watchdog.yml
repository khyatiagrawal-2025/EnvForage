name: PR Watchdog

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited]
  check_suite:
    types: [completed]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  watchdog:
    name: Monitor PR Quality
    runs-on: ubuntu-latest
    steps:
      - name: Analyze PR Quality
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Identify PR Number from payload across multiple trigger events
            let prNumber = null;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              // Parse check_suite and check_run payloads
              const prs = (context.payload.check_suite && context.payload.check_suite.pull_requests) ||
                          (context.payload.check_run && context.payload.check_run.pull_requests) ||
                          (context.payload.check_run && context.payload.check_run.check_suite && context.payload.check_run.check_suite.pull_requests);
              if (prs && prs.length > 0) {
                prNumber = prs[0].number;
              }
            }
            
            // Fallback: search associated PR using commit SHA
            if (!prNumber) {
              const sha = context.payload.after || context.sha;
              if (sha) {
                console.log(`No direct PR in payload. Searching associated PRs for commit SHA: ${sha}`);
                try {
                  const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    commit_sha: sha
                  });
                  if (prs && prs.length > 0) {
                    prNumber = prs[0].number;
                    console.log(`Found associated PR: #${prNumber}`);
                  }
                } catch (err) {
                  console.log(`Failed to list associated PRs: ${err.message}`);
                }
              }
            }
            
            if (!prNumber) {
              console.log('Skipping watchdog: No associated pull request could be resolved.');
              return;
            }
            
            console.log(`Executing quality analysis for Pull Request #${prNumber}`);
            
            // 2. Fetch PR details with a retry loop to handle pending mergeability status calculation
            let pr = null;
            const maxRetries = 3;
            for (let i = 0; i < maxRetries; i++) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = response.data;
              if (pr.mergeable !== null) {
                break;
              }
              console.log(`PR mergeability is currently null (calculating). Waiting 3 seconds (Attempt ${i + 1}/${maxRetries})...`);
              await new Promise(resolve => setTimeout(resolve, 3000));
            }
            
            const prAuthor = pr.user.login;
            const headSha = pr.head.sha;
            
            // 3. Detect Merge Conflicts
            const hasMergeConflicts = pr.mergeable === false || pr.mergeable_state === 'dirty';
            console.log(`Merge conflicts: ${hasMergeConflicts} (mergeable_state: ${pr.mergeable_state})`);
            
            // 4. Detect Failed Required and CI Checks
            const failedChecks = [];
            
            // Fetch check runs
            try {
              const checkRunsResponse = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              
              for (const run of checkRunsResponse.data.check_runs) {
                const runName = run.name.toLowerCase();
                // Avoid checking our own watchdog run to prevent self-trigger loop
                if (runName.includes('watchdog') || runName.includes('pr-watchdog')) {
                  continue;
                }
                
                if (run.status === 'completed' && ['failure', 'timed_out', 'action_required'].includes(run.conclusion)) {
                  failedChecks.push({
                    name: run.name,
                    url: run.html_url || '#'
                  });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to fetch check runs: ${err.message}`);
            }
            
            // Fetch legacy / combined status API states (e.g. external CI webhooks)
            try {
              const statusResponse = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              
              for (const status of statusResponse.data.statuses) {
                const contextName = status.context.toLowerCase();
                if (contextName.includes('watchdog') || contextName.includes('pr-watchdog')) {
                  continue;
                }
                
                if (['failure', 'error'].includes(status.state)) {
                  failedChecks.push({
                    name: status.context,
                    url: status.target_url || '#'
                  });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to fetch combined statuses: ${err.message}`);
            }
            
            console.log(`Failed checks: ${failedChecks.length}`);
            
            // 5. Fetch and Parse Review Comments for specific severities (critical, high, medium)
            const reviewsToParse = [];
            
            // Fetch PR Reviews
            try {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              for (const r of reviews) {
                if (r.body) {
                  reviewsToParse.push({
                    body: r.body,
                    author: r.user ? r.user.login : 'unknown',
                    url: r.html_url,
                    type: 'Review'
                  });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to list reviews: ${err.message}`);
            }
            
            // Fetch PR Review Comments (inline comments)
            try {
              const { data: reviewComments } = await github.rest.pulls.listReviewComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              for (const rc of reviewComments) {
                if (rc.body) {
                  reviewsToParse.push({
                    body: rc.body,
                    author: rc.user ? rc.user.login : 'unknown',
                    url: rc.html_url,
                    type: 'Review Comment'
                  });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to list review comments: ${err.message}`);
            }
            
            // Fetch PR Issue Comments (general discussion threads)
            try {
              const { data: issueComments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });
              for (const ic of issueComments) {
                // Ignore our own watchdog sticky comment
                if (ic.body && !ic.body.includes('<!-- PR-WATCHDOG-STICKY-COMMENT -->')) {
                  reviewsToParse.push({
                    body: ic.body,
                    author: ic.user ? ic.user.login : 'unknown',
                    url: ic.html_url,
                    type: 'General Comment'
                  });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to list issue comments: ${err.message}`);
            }
            
            // Parse for severity levels and identify CodeRabbit/Copilot context
            const findings = { critical: [], high: [], medium: [] };
            let hasCodeRabbit = false;
            let hasCopilot = false;
            
            for (const item of reviewsToParse) {
              const authorLower = item.author.toLowerCase();
              
              // Skip comments left by github-actions itself to avoid feedback loops
              if (authorLower === 'github-actions[bot]') {
                continue;
              }
              
              const isCR = authorLower.includes('coderabbit') || item.body.toLowerCase().includes('coderabbit');
              const isCP = authorLower.includes('copilot') || item.body.toLowerCase().includes('copilot');
              
              if (isCR) hasCodeRabbit = true;
              if (isCP) hasCopilot = true;
              
              const lines = item.body.split('\n');
              for (const line of lines) {
                const lineLower = line.toLowerCase();
                let severity = null;
                
                if (/\b(critical|severity:\s*critical)\b/i.test(lineLower)) {
                  severity = 'critical';
                } else if (/\b(high|severity:\s*high)\b/i.test(lineLower)) {
                  severity = 'high';
                } else if (/\b(medium|severity:\s*medium)\b/i.test(lineLower)) {
                  severity = 'medium';
                }
                
                if (severity) {
                  findings[severity].push({
                    author: item.author,
                    type: item.type,
                    snippet: line.trim().substring(0, 120),
                    url: item.url,
                    isCR,
                    isCP
                  });
                }
              }
            }
            
            const totalFindings = findings.critical.length + findings.high.length + findings.medium.length;
            console.log(`Parsed review findings: ${totalFindings} (Critical: ${findings.critical.length}, High: ${findings.high.length}, Medium: ${findings.medium.length})`);
            
            // 6. Build the Consolidated Sticky Bot Comment
            const commentSignature = '<!-- PR-WATCHDOG-STICKY-COMMENT -->';
            const hasIssues = hasMergeConflicts || failedChecks.length > 0 || totalFindings > 0;
            let commentBody = `${commentSignature}\n\n`;
            
            if (!hasIssues) {
              commentBody += `## 🎉 PR Quality Watchdog: All Checks Passed!

Hi @${prAuthor}, 

Great job! All issues have been resolved.

* **Merge Conflicts:** ✅ No conflicts detected
* **CI / Build Checks:** ✅ All checks passed
* **Review Feedback:** ✅ No critical, high, or medium severity concerns identified

${hasCodeRabbit ? '*🤖 CodeRabbit review feedback was detected and analyzed.*\n' : ''}${hasCopilot ? '*🤖 GitHub Copilot comments were detected and analyzed.*\n' : ''}
---
*Last updated: ${new Date().toUTCString()}*`;
            } else {
              commentBody += `## 🔍 PR Quality Watchdog Report

Hi @${prAuthor},

We detected some items on this Pull Request that require attention before it can be merged:

`;
              
              // Merge conflict details
              if (hasMergeConflicts) {
                commentBody += `### ❌ Merge Conflicts
This branch has merge conflicts with the target branch. Please rebase or merge the target branch and resolve the conflicts.
\n`;
              } else {
                commentBody += `### ✅ Merge Conflicts
No conflicts detected.
\n`;
              }
              
              // CI checks details
              if (failedChecks.length > 0) {
                commentBody += `### ❌ Failing CI Checks
The following check runs or commit statuses are failing:
`;
                for (const check of failedChecks) {
                  commentBody += `- [${check.name}](${check.url})\n`;
                }
                commentBody += `\n`;
              } else {
                commentBody += `### ✅ CI Checks
All checks passed.
\n`;
              }
              
              // Review findings details
              if (totalFindings > 0) {
                commentBody += `### ❌ Review Feedback Findings
The following issues were flagged in reviews:

`;
                if (findings.critical.length > 0) {
                  commentBody += `#### 🔴 Critical Severity Issues\n`;
                  for (const item of findings.critical) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
                
                if (findings.high.length > 0) {
                  commentBody += `#### 🟠 High Severity Issues\n`;
                  for (const item of findings.high) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
                
                if (findings.medium.length > 0) {
                  commentBody += `#### 🟡 Medium Severity Issues\n`;
                  for (const item of findings.medium) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
              } else {
                commentBody += `### ✅ Review Feedback
No critical, high, or medium severity review issues detected.
\n`;
              }
              
              commentBody += `Please resolve the issues above to proceed.
\n---
*Last updated: ${new Date().toUTCString()}*`;
            }
            
            // 7. Find existing watchdog comment to create or update
            let comments = [];
            try {
              const res = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              comments = res.data;
            } catch (err) {
              console.log(`Warning: Failed to fetch issue comments: ${err.message}`);
            }
            
            const existingSticky = comments.find(c => c.body && c.body.includes(commentSignature));
            
            if (existingSticky) {
              console.log(`Updating existing sticky comment (ID: ${existingSticky.id}).`);
              try {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingSticky.id,
                  body: commentBody
                });
              } catch (err) {
                console.log(`Failed to update comment: ${err.message}`);
              }
            } else if (hasIssues) {
              console.log('Creating new sticky comment.');
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: commentBody
                });
              } catch (err) {
                console.log(`Failed to create comment: ${err.message}`);
              }
            }
            
            // 8. Label Management based on status
            const currentLabels = pr.labels.map(l => l.name);
            const labelsToAdd = [];
            const labelsToRemove = [];
            
            if (hasMergeConflicts) {
              if (!currentLabels.includes('merge-conflicts')) labelsToAdd.push('merge-conflicts');
            } else {
              if (currentLabels.includes('merge-conflicts')) labelsToRemove.push('merge-conflicts');
            }
            
            if (failedChecks.length > 0) {
              if (!currentLabels.includes('failing-checks')) labelsToAdd.push('failing-checks');
            } else {
              if (currentLabels.includes('failing-checks')) labelsToRemove.push('failing-checks');
            }
            
            if (totalFindings > 0) {
              if (!currentLabels.includes('needs-review-fixes')) labelsToAdd.push('needs-review-fixes');
            } else {
              if (currentLabels.includes('needs-review-fixes')) labelsToRemove.push('needs-review-fixes');
            }
            
            // Add required labels
            if (labelsToAdd.length > 0) {
              console.log(`Adding labels: ${labelsToAdd.join(', ')}`);
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: labelsToAdd
                });
              } catch (err) {
                console.log(`Failed to add labels: ${err.message}`);
              }
            }
            
            // Remove resolved labels
            for (const label of labelsToRemove) {
              console.log(`Removing label: ${label}`);
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: label
                });
              } catch (err) {
                console.log(`Failed to remove label '${label}': ${err.message}`);
              }
            }
